events {}

http {

  # Rate limiting (challenge part)
  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

  upstream api {
    server api:3000;
  }

  upstream frontend {
    server frontend:80;
  }

  server {
    listen 80;

    # FRONTEND ROUTE
    location / {
      proxy_pass http://frontend;
    }

    # API ROUTE + RATE LIMIT
    location /api/ {
      limit_req zone=api_limit burst=20 nodelay;

      proxy_pass http://api/;
    }
  }
}