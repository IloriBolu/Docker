services:
  nginx:
    image: nginx:latest
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build: ./frontend
    restart: unless-stopped

  api:
    build: ./api
    restart: unless-stopped

  db:
    image: postgres:15
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped

  loki:
    image: grafana/loki:2.9.0
    restart: unless-stopped

  promtail:
    image: grafana/promtail:2.9.0
    restart: unless-stopped