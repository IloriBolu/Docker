version: "3.9"

services:
  nginx:
    image: nginx:latest
    container_name: nginx
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "80:80"
    depends_on:
      - frontend
      - api
    networks:
      - frontend-net
      - backend-net

  frontend:
    build: ./frontend
    container_name: frontend
    networks:
      - frontend-net

  api:
    build: ./api
    container_name: api
    networks:
      - backend-net

  db:
    image: postgres:15
    container_name: db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: appdb
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - backend-net

networks:
  frontend-net:
    driver: bridge

  backend-net:
    driver: bridge
    internal: true