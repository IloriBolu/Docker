version: "3.9"

services:

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - frontend
      - api
    networks:
      - app-net

  frontend:
    build: ./frontend
    expose:
      - "80"
    networks:
      - app-net

  api:
    build: ./api
    expose:
      - "3000"
    networks:
      - app-net

networks:
  app-net:
    driver: bridge